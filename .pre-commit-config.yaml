repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "production"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - sqlalchemy[mypy]
          - types-redis
          - types-passlib
        files: ^backend/

  - repo: local
    hooks:
      - id: check-env-vars
        name: Check .env not committed
        language: script
        entry: scripts/hooks/check_env.sh
        files: \.env$
        exclude: \.env\.example$

      - id: validate-migrations
        name: Validate Alembic migration heads
        language: python
        entry: scripts/hooks/validate_migrations.py
        files: ^backend/app/migrations/
        pass_filenames: false

      - id: no-print-statements
        name: No print() in production code
        language: pygrep
        entry: "^(?!.*#\\s*noqa).*\\bprint\\s*\\("
        files: ^backend/app/
        exclude: ^backend/app/migrations/
        types: [python]

      - id: security-check
        name: Bandit security scan
        language: python
        entry: python -m bandit
        args: ["-r", "backend/app", "-ll", "--skip", "B101,B601"]
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
