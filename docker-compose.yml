# docker-compose.yml — Find Abroad development stack
# Copy .env.example to .env and fill in your values before running.
#
# Core services (always needed):
#   docker compose up backend frontend postgres redis
#
# Full stack including optional services:
#   docker compose up
#
# The NEXT_PUBLIC_API_URL in your .env file must be reachable from the USER'S BROWSER.
# For local dev: http://localhost:8000/api/v1  (default in .env.example, DO NOT override here)

services:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    container_name: find_abroad_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # These override .env for container-internal routing (service names as hostnames)
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Password is embedded in the URL; REDIS_URL points to the redis service by name
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - find_abroad_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: find_abroad_frontend
    restart: unless-stopped
    env_file: .env
    # NOTE: Do NOT override NEXT_PUBLIC_API_URL here.
    # NEXT_PUBLIC_ vars are baked into the browser bundle. The value must be a URL
    # the USER'S BROWSER can reach — not an internal Docker service name.
    # Set NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1 in your .env file.
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - find_abroad_net

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: find_abroad_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - find_abroad_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: find_abroad_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - find_abroad_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Meilisearch ────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: find_abroad_meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
      - MEILI_ENV=development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - find_abroad_net

  # ─── Listmonk Email ─────────────────────────────────────────────────────────
  listmonk:
    image: listmonk/listmonk:latest
    container_name: find_abroad_listmonk
    restart: unless-stopped
    command: --config /listmonk/config.toml
    volumes:
      - ./nginx/listmonk_config.toml:/listmonk/config.toml:ro
      - listmonk_data:/listmonk/uploads
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - find_abroad_net

  # ─── Ollama AI ──────────────────────────────────────────────────────────────
  # CPU-only by default. For GPU support, see:
  # https://docs.docker.com/compose/gpu-support/
  # Uncomment the `deploy:` block below only if you have NVIDIA drivers + nvidia-container-toolkit.
  ollama:
    image: ollama/ollama:latest
    container_name: find_abroad_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - find_abroad_net
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: find_abroad_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - find_abroad_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  meilisearch_data:
  listmonk_data:
  ollama_data:
  certbot_data:
  certbot_www:

networks:
  find_abroad_net:
    driver: bridge
